<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aditya Thaksh International School Homework Portal</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        
        /* Scrolling Text Styling */
        .marquee-container {
            width: 100%;
            overflow: hidden;
            background: #f1f1f1;
            padding: 10px 0;
            margin-bottom: 20px;
            border-radius: 5px;
        }
        .marquee-text {
            display: inline-block;
            white-space: nowrap;
            animation: scroll 15s linear infinite;
            font-weight: bold;
            color: #2c3e50;
        }
        @keyframes scroll {
            from { transform: translateX(100%); }
            to { transform: translateX(-100%); }
        }

        header { text-align: center; color: #2c3e50; margin-bottom: 20px; }
        .container { max-width: 600px; margin: auto; }
        select { width: 100%; padding: 10px; font-size: 16px; margin-bottom: 20px; }
        #displayArea { border: 1px solid #ccc; padding: 20px; border-radius: 8px; background-color: #f9f9f9; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="container">
    <div class="marquee-container">
        <div class="marquee-text">
            Welcome to Aditya Thaksh International School - Excellence in Education - Committed to Academic Success
        </div>
    </div>

    <header>
        <h1>Aditya Thaksh International School</h1>
    </header>

    <label for="gradeSelect">Select Grade:</label>
    <select id="gradeSelect" onchange="displayMessage()">
        <option value="">-- Choose a Grade --</option>
        <option value="K1">K1</option>
        <option value="K2">K2</option>
        <option value="GradeI">GradeI</option>
        <option value="GradeII">GradeII</option>
        <option value="GradeIII">GradeIII</option>
        <option value="GradeIV">GradeIV</option>
        <option value="GradeV">GradeV</option>
        <option value="GradeVI">GradeVI</option>
        <option value="GradeVII">GradeVII</option>
        <option value="GradeVIII">GradeVIII</option>
        <option value="GradeIX">GradeIX</option>
        <option value="GradeX">GradeX</option>
    </select>

    <div id="displayArea">Please select a grade to view the daily report.</div>
</div>

<script>
    const message = `Namaste parents,

📔Session:-2

📔Session-3.

(Hin):Explained L.6(Unseen passage).

    function displayMessage() {
        const select = document.getElementById('gradeSelect');
        const display = document.getElementById('displayArea');
        
        if (select.value) {
            display.innerText = "Daily Report for " + select.value + ":\n\n" + message;
        } else {
            display.innerText = "Please select a grade to view the daily report.";
        }
    }
</script>

</body>
</html>
